name: Playwright Tests
on:

  # Cấu hình 1: Tự động chạy khi push code
  push:
    branches: [ main, master ]

  # Cấu hình 2: Tự động chay khi Pull Request - PR từ nhánh phụ vào main
  pull_request:
    branches: [ main, master ]
  
  # Cấu hình 3: Cho phép bấm nút chạy bằng tay
  workflow_dispatch:
    inputs:
      test_scope:
        description: 'Nhập thư mục hoặc Tag cần chạy (Khi bấm bằng tay)'
        required: true
        default: 'tests/' # Nếu push code hoặc để mặc định sẽ chạy hết thư mục tests
  
jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
    - name: Install dependencies
      run: npm ci
    - name: Install Playwright browsers
      run: npx playwright install --with-deps
    - name: Run Playwright tests
      # Câu lệnh thông minh: Nếu push code sẽ chạy 'tests/', nếu chạy tay sẽ lấy giá trị bạn nhập
      run: npx playwright test ${{ github.event.inputs.test_scope || 'tests/' }}
      env:
        WEB_URL: ${{ secrets.WEB_URL}}
        API_URL: ${{ secrets.API_URL}}
        ADMIN_USER: ${{ secrets.ADMIN_USER}}
        ADMIN_PASS: ${{ secrets.ADMIN_PASS}}
        ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN}}
    - uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30